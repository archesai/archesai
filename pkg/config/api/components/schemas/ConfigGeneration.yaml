description: Code generation configuration
type: object
title: ConfigGeneration
x-internal: config
x-codegen-schema-type: valueobject
properties:
  spec:
    description: Path to the OpenAPI specification file
    type: string
    minLength: 1
    maxLength: 4096
    pattern: ^[a-zA-Z0-9_./-]+$
  includes:
    description: Built-in package includes (server, auth, config, pipelines, executor, storage)
    type: array
    maxItems: 100
    items:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-z_]+$
  only:
    description: Generators to run (empty = all)
    type: array
    maxItems: 100
    items:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-z_]+$
  lint:
    description: Enable strict linting
    type: boolean
additionalProperties: false
